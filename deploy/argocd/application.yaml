apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uav-gnn-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/kaing615/UAV-link-quality-routing-support.git
    targetRevision: main
    path: deploy/kustomize/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: uav-gnn-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
