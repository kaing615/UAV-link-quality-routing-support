name: Build, Push & Deploy

on:
  push:
    branches: [main]
    tags: ["model-v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/uav-gnn-serve

permissions:
  contents: write
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml
            setup.cfg

      - name: Install DVC GDrive deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --force-reinstall \
            "dvc==3.67.1" \
            "dvc-gdrive==3.0.1" \
            "PyDrive2==1.21.3" \
            "cryptography==43.0.3" \
            "pyOpenSSL==24.2.1"
          python -m pip check
          python -m pip freeze | grep -Ei '^(dvc|dvc-gdrive|pydrive2|cryptography|pyopenssl)=='

      - name: Configure DVC GDrive auth
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          python - <<'PY'
          import json, os
          data = json.loads(os.environ["GDRIVE_CREDENTIALS_DATA"])
          if data.get("type") != "service_account":
              raise SystemExit("GDRIVE_CREDENTIALS_DATA must be a service account JSON key")
          print("Using service account:", data.get("client_email"))
          PY

          dvc remote list
          DVC_REMOTE="$(dvc remote default || true)"
          if [ -z "$DVC_REMOTE" ]; then
            DVC_REMOTE="$(dvc remote list | awk 'NR==1 {print $1}')"
          fi
          echo "Using DVC remote: $DVC_REMOTE"
          dvc remote modify --local "$DVC_REMOTE" gdrive_use_service_account true
          echo "$GDRIVE_CREDENTIALS_DATA" > dvc_creds.json
          dvc remote modify --local "$DVC_REMOTE" gdrive_service_account_json_file_path dvc_creds.json
      - name: Stage serving model from DVC remote
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          bash scripts/mlops/stage_serving_model.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push inference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.serve
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-kustomize:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz \
            https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.6.0/kustomize_v5.6.0_linux_amd64.tar.gz
          tar xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/

      - name: Update staging image tag
        working-directory: deploy/kustomize/overlays/staging
        run: |
          kustomize edit set image \
            uav-gnn-serve=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image_tag }}

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/kustomize/
          git diff --cached --quiet || git commit -m "chore(deploy): update image to ${{ needs.build-push.outputs.image_tag }}"
          git push
